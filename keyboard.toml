# Documentation: https://rmk.rs/docs/configuration.html
[keyboard]
name = "jksofelv2"
product_name = "rjsofelv2"
vendor_id = 0x4c4b
product_id = 0x4643
manufacturer = "RJ"
chip = "nrf52840"


[layout]
rows = 5
cols = 12
layers = 4
matrix_map = """
(0,0,L) (0,1,L) (0,2,L) (0,3,L) (0,4,L) (0,5,L)    (0,6,R) (0,7,R) (0,8,R) (0,9,R) (0,10,R) (0,11,R)
(1,0,L) (1,1,L) (1,2,L) (1,3,L) (1,4,L) (1,5,L)    (1,6,R) (1,7,R) (1,8,R) (1,9,R) (1,10,R) (1,11,R)
(2,0,L) (2,1,L) (2,2,L) (2,3,L) (2,4,L) (2,5,L)    (2,6,R) (2,7,R) (2,8,R) (2,9,R) (2,10,R) (2,11,R)
(3,0,L) (3,1,L) (3,2,L) (3,3,L) (3,4,L) (3,5,L)    (3,6,R) (3,7,R) (3,8,R) (3,9,R) (3,10,R) (3,11,R)
(4,0,L) (4,1,L) (4,2,L) (4,3,L) (4,4,L) (4,5,L)    (4,6,R) (4,7,R) (4,8,R) (4,9,R) (4,10,R) (4,11,R)
"""

[storage]


# Ble configuration
# To use the default configuration, ignore this section completely
[ble]
# Whether to enable BLE feature
enabled = true
# nRF52 SAADC pin for reading battery level, you can use a pin number or "vddh"
battery_adc_pin = "vddh"


[split]
connection = "ble"

[split.central]
rows = 5
cols = 6
row_offset = 0
col_offset = 0
ble_addr = [0x18, 0xe2, 0x21, 0x80, 0xc0, 0xc7]
# Battery monitoring configuration for central device
# battery_adc_pin = "P0_05"
# adc_divider_measured = 2000
# adc_divider_total = 2806


[split.central.matrix]
# Row and col pins are mandatory
row_pins = ["P0_24","P1_00","P0_11","P1_04","P1_06"]
col_pins = ["P0_02","P1_15","P1_13","P1_11","P0_10","P0_09"]


[[split.peripheral]]
rows = 5
cols = 6
row_offset = 0
col_offset = 6
ble_addr = [0x7e, 0xfe, 0x73, 0x9e, 0x66, 0xe3]
# Battery monitoring for peripheral
# battery_adc_pin = "P0_05"
# adc_divider_measured = 2000
# adc_divider_total = 2806

[split.peripheral.matrix]
matrix_type = "normal"
row_pins = ["P0_24","P1_00","P0_11","P1_04","P1_06"]
col_pins = ["P0_02","P1_15","P1_13","P1_11","P0_10","P0_09"]
